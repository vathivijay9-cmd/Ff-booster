name: Build APK

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # gradlew ഫയൽ ഇല്ലെങ്കിൽ അത് തനിയെ ഉണ്ടാക്കാൻ ഇത് സഹായിക്കും
      - name: Validate Gradle Wrapper or Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # പുതിയ ഗ്രാഡിൽ വെച്ച് നേരിട്ട് ബിൽഡ് ചെയ്യുന്നു
      - name: Build with Gradle
        run: gradle assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk


      


      
         
          


name: Build APK

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Validate Gradle Wrapper or Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # കീ-സ്റ്റോർ ഫയൽ ഇല്ലെങ്കിലും ബിൽഡ് നടക്കാൻ വേണ്ടിയുള്ള കമാൻഡ്
      - name: Build with Gradle
        run: gradle assembleDebug -Pandroid.injected.signing.store.file="" -Pandroid.injected.signing.store.password="" -Pandroid.injected.signing.key.alias="" -Pandroid.injected.signing.key.password=""

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk



      


      
         
          

